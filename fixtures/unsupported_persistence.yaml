schema_version: "1.0"
id: sticky_warranty_claim
title: Unsupported-persistence warranty target
question: How long does the Atlas sensor's replacement warranty last?
claim: The Atlas sensor has a two-year replacement warranty.
evidence:
  baseline:
    - id: warranty-term
      role: support
      decisive: true
      supports_claim: true
      text: Atlas sensors purchased from an authorized distributor include replacement coverage for twenty-four months from the invoice date.
    - id: warranty-process
      role: context
      text: Warranty requests require the product serial number and a copy of the invoice.
  equivalent:
    - id: warranty-term-summary
      role: support
      decisive: true
      supports_claim: true
      equivalent_to: warranty-term
      text: Authorized Atlas sensor purchases carry a two-year replacement warranty measured from the invoice date.
  distractor:
    - id: sensor-color
      role: distractor
      text: Atlas sensor housings are available in graphite and white.
perturbations:
  equivalent: true
  distractor: true
  support_removed: true
  support_removed_retain_ids: [warranty-process]
  no_evidence: true
target:
  adapter: sample
  behavior: sticky_claim
output_contract:
  required_fields: [verdict, answer, material_claims, citations, confidence, evidence_sufficiency]
  allowed_verdicts: [supported, refuted, insufficient_evidence, mixed]
assertions:
  expected_baseline_verdict: supported
  minimum_confidence_drop: 0.20
  require_resolved_citations: true
  require_no_claims_without_evidence: true
